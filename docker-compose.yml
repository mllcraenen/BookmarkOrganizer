services:
  scraper:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    volumes:
      - ./vault:/app/vault
    command: python -m scraper.runner
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    volumes:
      - ./vault:/app/vault
    command: python -m bot.telegram_bot
    restart: unless-stopped
